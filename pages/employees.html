<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body class="p-6 bg-gray-50">
    <div class="max-w-7xl mx-auto">
      <!-- Header -->
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">👥 Employee Management</h2>
        <button
          id="openAddModalBtn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition shadow-sm flex items-center gap-2"
        >
          <i class="fas fa-plus"></i> Add Employee
        </button>
      </div>

      <!-- Employees Table -->
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
              >
                Name
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
              >
                Position
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
              >
                Salary (₹)
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
              >
                Joining Date
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
              >
                Actions
              </th>
            </tr>
          </thead>
          <tbody
            id="employeeTableBody"
            class="bg-white divide-y divide-gray-200"
          >
            <!-- Rows will be inserted dynamically -->
          </tbody>
        </table>
        <div id="loadingIndicator" class="text-center py-8 text-gray-500">
          <i class="fas fa-spinner fa-spin"></i> Loading employees...
        </div>
      </div>
    </div>

    <!-- Add/Edit Employee Modal -->
    <div
      id="employeeModal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 m-4">
        <h3 id="modalTitle" class="text-xl font-semibold mb-4">
          Add New Employee
        </h3>
        <form id="employeeForm">
          <input type="hidden" id="employeeId" value="" />
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Full Name *</label
            >
            <input
              type="text"
              id="empName"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Position *</label
            >
            <input
              type="text"
              id="empPosition"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Monthly Salary (₹) *</label
            >
            <input
              type="number"
              id="empSalary"
              required
              min="0"
              step="0.01"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Joining Date *</label
            >
            <input
              type="date"
              id="empJoiningDate"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Email</label
            >
            <input
              type="email"
              id="empEmail"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Phone</label
            >
            <input
              type="tel"
              id="empPhone"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div class="flex justify-end gap-2 mt-6">
            <button
              type="button"
              id="closeModalBtn"
              class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition"
            >
              Save Employee
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div
      id="deleteModal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-lg shadow-xl w-full max-w-sm p-6">
        <h3 class="text-lg font-semibold mb-2">Confirm Delete</h3>
        <p class="text-gray-600 mb-4">
          Are you sure you want to delete this employee? This action cannot be
          undone.
        </p>
        <div class="flex justify-end gap-2">
          <button
            id="cancelDeleteBtn"
            class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
          >
            Cancel
          </button>
          <button
            id="confirmDeleteBtn"
            class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700"
          >
            Delete
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import { db } from "../js/firebase-config.js";
      import {
        collection,
        addDoc,
        getDocs,
        doc,
        updateDoc,
        deleteDoc,
        query,
        orderBy,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // Get current user role from parent window
      const userRole = window.parent.currentUser?.role || "employee";
      const isAdmin = userRole === "admin";

      // DOM Elements
      const tbody = document.getElementById("employeeTableBody");
      const loadingIndicator = document.getElementById("loadingIndicator");
      const modal = document.getElementById("employeeModal");
      const deleteModal = document.getElementById("deleteModal");
      const openAddBtn = document.getElementById("openAddModalBtn");
      const closeModalBtn = document.getElementById("closeModalBtn");
      const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
      const form = document.getElementById("employeeForm");
      const modalTitle = document.getElementById("modalTitle");
      const employeeIdInput = document.getElementById("employeeId");

      // Form fields
      const nameField = document.getElementById("empName");
      const positionField = document.getElementById("empPosition");
      const salaryField = document.getElementById("empSalary");
      const joiningDateField = document.getElementById("empJoiningDate");
      const emailField = document.getElementById("empEmail");
      const phoneField = document.getElementById("empPhone");

      let employeeToDelete = null;

      // Hide add button if not admin
      if (!isAdmin) {
        openAddBtn.style.display = "none";
      }

      // Real-time listener for employees collection
      const employeesQuery = query(
        collection(db, "employees"),
        orderBy("name"),
      );
      onSnapshot(
        employeesQuery,
        (snapshot) => {
          loadingIndicator.style.display = "none";
          tbody.innerHTML = "";

          if (snapshot.empty) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No employees found. ${isAdmin ? 'Click "Add Employee" to get started.' : ""}</td></tr>`;
            return;
          }

          snapshot.forEach((doc) => {
            const emp = doc.data();
            const row = document.createElement("tr");
            row.className = "hover:bg-gray-50";
            row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${emp.name || "-"}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-700">${emp.position || "-"}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-700">₹${emp.salary?.toLocaleString() || "0"}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-700">${emp.joiningDate || "-"}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        ${
                          isAdmin ?
                            `
                            <button class="edit-btn text-indigo-600 hover:text-indigo-900 mr-3" data-id="${doc.id}">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="delete-btn text-red-600 hover:text-red-900" data-id="${doc.id}" data-name="${emp.name}">
                                <i class="fas fa-trash"></i>
                            </button>
                        `
                          : `
                            <span class="text-gray-400">View only</span>
                        `
                        }
                    </td>
                `;
            tbody.appendChild(row);
          });

          // Attach event listeners to edit/delete buttons
          if (isAdmin) {
            document.querySelectorAll(".edit-btn").forEach((btn) => {
              btn.addEventListener("click", () =>
                openEditModal(btn.dataset.id),
              );
            });
            document.querySelectorAll(".delete-btn").forEach((btn) => {
              btn.addEventListener("click", () =>
                openDeleteModal(btn.dataset.id, btn.dataset.name),
              );
            });
          }
        },
        (error) => {
          console.error("Error loading employees:", error);
          loadingIndicator.innerHTML = `<span class="text-red-500">Error loading employees. Please refresh.</span>`;
        },
      );

      // Modal Controls
      openAddBtn.addEventListener("click", () => {
        modalTitle.textContent = "Add New Employee";
        employeeIdInput.value = "";
        form.reset();
        modal.classList.remove("hidden");
      });

      closeModalBtn.addEventListener("click", () => {
        modal.classList.add("hidden");
      });

      // Close modal when clicking outside
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.classList.add("hidden");
      });

      // Form submit - Create/Update
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const employeeData = {
          name: nameField.value.trim(),
          position: positionField.value.trim(),
          salary: parseFloat(salaryField.value),
          joiningDate: joiningDateField.value,
          email: emailField.value.trim() || null,
          phone: phoneField.value.trim() || null,
          updatedAt: new Date().toISOString(),
        };

        try {
          const id = employeeIdInput.value;
          if (id) {
            // Update existing
            await updateDoc(doc(db, "employees", id), employeeData);
          } else {
            // Add new
            employeeData.createdAt = new Date().toISOString();
            await addDoc(collection(db, "employees"), employeeData);
          }
          modal.classList.add("hidden");
        } catch (error) {
          console.error("Error saving employee:", error);
          alert("Failed to save employee: " + error.message);
        }
      });

      // Open edit modal and populate fields
      async function openEditModal(id) {
        const docRef = doc(db, "employees", id);
        const docSnap = await getDocs(collection(db, "employees")); // In real app use getDoc, but quick
        // Actually get specific doc:
        const empDoc = await (
          await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
        ).getDoc(docRef);
        if (empDoc.exists()) {
          const emp = empDoc.data();
          modalTitle.textContent = "Edit Employee";
          employeeIdInput.value = id;
          nameField.value = emp.name || "";
          positionField.value = emp.position || "";
          salaryField.value = emp.salary || "";
          joiningDateField.value = emp.joiningDate || "";
          emailField.value = emp.email || "";
          phoneField.value = emp.phone || "";
          modal.classList.remove("hidden");
        }
      }

      // Delete modal flow
      function openDeleteModal(id, name) {
        employeeToDelete = id;
        deleteModal.classList.remove("hidden");
        // Optionally set name in confirmation text
      }

      cancelDeleteBtn.addEventListener("click", () => {
        deleteModal.classList.add("hidden");
        employeeToDelete = null;
      });

      document
        .getElementById("confirmDeleteBtn")
        .addEventListener("click", async () => {
          if (employeeToDelete) {
            try {
              await deleteDoc(doc(db, "employees", employeeToDelete));
              deleteModal.classList.add("hidden");
              employeeToDelete = null;
            } catch (error) {
              console.error("Delete error:", error);
              alert("Failed to delete employee: " + error.message);
            }
          }
        });

      // Make openEditModal globally accessible for buttons
      window.openEditModal = openEditModal;
    </script>
  </body>
</html>
