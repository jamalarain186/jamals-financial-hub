<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      .tab-active {
        background-color: #4f46e5;
        color: white;
      }
      .tab-inactive {
        background-color: #f3f4f6;
        color: #374151;
      }
      .voucher-row:hover {
        background-color: #f9fafb;
      }
      .clickable-code {
        cursor: pointer;
        text-decoration: underline;
      }
    </style>
  </head>
  <body class="p-6 bg-gray-50">
    <div class="max-w-7xl mx-auto">
      <h2 class="text-2xl font-bold text-gray-800 mb-4">
        💰 Financial Vouchers
      </h2>

      <!-- Voucher Type Tabs -->
      <div class="flex flex-wrap gap-2 mb-6">
        <button
          data-type="CR"
          class="voucher-tab px-4 py-2 rounded-lg font-medium tab-active"
        >
          Cash Receipt
        </button>
        <button
          data-type="CP"
          class="voucher-tab px-4 py-2 rounded-lg font-medium tab-inactive"
        >
          Cash Payment
        </button>
        <button
          data-type="BR"
          class="voucher-tab px-4 py-2 rounded-lg font-medium tab-inactive"
        >
          Bank Receipt
        </button>
        <button
          data-type="BP"
          class="voucher-tab px-4 py-2 rounded-lg font-medium tab-inactive"
        >
          Bank Payment
        </button>
        <button
          data-type="JV"
          class="voucher-tab px-4 py-2 rounded-lg font-medium tab-inactive"
        >
          Journal Voucher
        </button>
      </div>

      <!-- Voucher Entry Form -->
      <div class="bg-white rounded-lg shadow p-6 mb-8">
        <h3 class="text-lg font-semibold mb-4" id="formTitle">
          New Cash Receipt
        </h3>
        <form id="voucherForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="hidden" id="voucherId" value="" />
          <input type="hidden" id="voucherType" value="CR" />

          <div
            id="accountFields"
            class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4"
          >
            <!-- Dynamic fields injected by JS -->
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Date *</label
            >
            <input
              type="date"
              id="voucherDate"
              required
              class="w-full px-3 py-2 border rounded-lg"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Amount (₹) *</label
            >
            <input
              type="number"
              id="amount"
              min="0.01"
              step="0.01"
              required
              class="w-full px-3 py-2 border rounded-lg"
            />
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Narration</label
            >
            <textarea
              id="narration"
              rows="2"
              class="w-full px-3 py-2 border rounded-lg"
            ></textarea>
          </div>
          <div class="md:col-span-2 flex justify-end gap-2">
            <button
              type="button"
              id="clearFormBtn"
              class="px-4 py-2 border rounded-lg text-gray-700 hover:bg-gray-50"
            >
              Clear
            </button>
            <button
              type="submit"
              class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"
            >
              Save Voucher
            </button>
          </div>
        </form>
      </div>

      <!-- Recent Vouchers List -->
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="px-6 py-4 border-b flex justify-between items-center">
          <h3 class="font-semibold text-gray-800">Recent Vouchers</h3>
          <span id="listCount" class="text-sm text-gray-500"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Code
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Date
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Type
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Account
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Amount
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Actions
                </th>
              </tr>
            </thead>
            <tbody
              id="voucherTableBody"
              class="bg-white divide-y divide-gray-200"
            >
              <!-- Rows populated dynamically -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Voucher Detail Modal -->
    <div
      id="detailModal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 m-4">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-semibold">Voucher Details</h3>
          <button
            id="closeDetailModalBtn"
            class="text-gray-500 hover:text-gray-700"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div id="detailContent" class="space-y-3">
          <!-- Filled dynamically -->
        </div>
        <div class="mt-6 flex justify-end">
          <button
            id="closeDetailBtn"
            class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import { db } from "../js/firebase-config.js";
      import {
        saveVoucher,
        updateVoucher,
        deleteVoucher,
        getVoucher,
      } from "../js/voucher-service.js";
      import {
        collection,
        onSnapshot,
        query,
        orderBy,
        limit,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const userRole = window.parent.currentUser?.role || "employee";
      const isAdmin = userRole === "admin";

      // DOM Elements
      const tabs = document.querySelectorAll(".voucher-tab");
      const voucherTypeInput = document.getElementById("voucherType");
      const formTitle = document.getElementById("formTitle");
      const accountFieldsDiv = document.getElementById("accountFields");
      const form = document.getElementById("voucherForm");
      const voucherId = document.getElementById("voucherId");
      const clearBtn = document.getElementById("clearFormBtn");
      const tbody = document.getElementById("voucherTableBody");
      const detailModal = document.getElementById("detailModal");
      const detailContent = document.getElementById("detailContent");
      const closeDetailBtn = document.getElementById("closeDetailBtn");
      const closeDetailModalBtn = document.getElementById(
        "closeDetailModalBtn",
      );

      // Voucher configurations
      const voucherConfig = {
        CR: {
          title: "Cash Receipt",
          fields: [
            {
              name: "debitAccount",
              label: "Debit Account (Cash/Bank)",
              type: "select",
              options: ["Cash in Hand", "Bank Account"],
            },
            {
              name: "creditAccount",
              label: "Credit Account (Income/Customer)",
              type: "text",
            },
          ],
        },
        CP: {
          title: "Cash Payment",
          fields: [
            {
              name: "debitAccount",
              label: "Debit Account (Expense/Supplier)",
              type: "text",
            },
            {
              name: "creditAccount",
              label: "Credit Account (Cash)",
              type: "select",
              options: ["Cash in Hand"],
            },
          ],
        },
        BR: {
          title: "Bank Receipt",
          fields: [
            {
              name: "debitAccount",
              label: "Debit Account (Bank)",
              type: "select",
              options: ["Bank Account"],
            },
            {
              name: "creditAccount",
              label: "Credit Account (Income/Customer)",
              type: "text",
            },
          ],
        },
        BP: {
          title: "Bank Payment",
          fields: [
            {
              name: "debitAccount",
              label: "Debit Account (Expense/Supplier)",
              type: "text",
            },
            {
              name: "creditAccount",
              label: "Credit Account (Bank)",
              type: "select",
              options: ["Bank Account"],
            },
          ],
        },
        JV: {
          title: "Journal Voucher",
          fields: [
            { name: "debitAccount", label: "Debit Account", type: "text" },
            { name: "creditAccount", label: "Credit Account", type: "text" },
          ],
        },
      };

      // Render fields based on voucher type
      function renderFields(type) {
        const config = voucherConfig[type];
        formTitle.textContent = `New ${config.title}`;
        voucherTypeInput.value = type;
        let html = "";
        config.fields.forEach((field) => {
          if (field.type === "select") {
            html += `<div><label class="block text-sm font-medium text-gray-700 mb-1">${field.label}</label><select id="${field.name}" class="w-full px-3 py-2 border rounded-lg">`;
            field.options.forEach((opt) => (html += `<option>${opt}</option>`));
            html += `</select></div>`;
          } else {
            html += `<div><label class="block text-sm font-medium text-gray-700 mb-1">${field.label}</label><input type="text" id="${field.name}" class="w-full px-3 py-2 border rounded-lg"></div>`;
          }
        });
        accountFieldsDiv.innerHTML = html;
      }

      // Tab switching
      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          const type = tab.dataset.type;
          tabs.forEach(
            (t) =>
              (t.className =
                "voucher-tab px-4 py-2 rounded-lg font-medium tab-inactive"),
          );
          tab.className =
            "voucher-tab px-4 py-2 rounded-lg font-medium tab-active";
          renderFields(type);
        });
      });

      renderFields("CR"); // Initial

      // Clear form
      clearBtn.addEventListener("click", () => {
        voucherId.value = "";
        form.reset();
        renderFields(voucherTypeInput.value);
      });

      // Save voucher
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!isAdmin) {
          alert("Only admin can create vouchers");
          return;
        }

        const type = voucherTypeInput.value;
        const config = voucherConfig[type];
        const voucherData = {
          voucherType: type,
          date: document.getElementById("voucherDate").value,
          amount: parseFloat(document.getElementById("amount").value),
          narration: document.getElementById("narration").value,
        };
        config.fields.forEach((field) => {
          voucherData[field.name] = document.getElementById(field.name).value;
        });

        try {
          if (voucherId.value) {
            await updateVoucher(voucherId.value, voucherData);
          } else {
            await saveVoucher(voucherData);
          }
          clearBtn.click();
        } catch (error) {
          alert("Error saving voucher: " + error.message);
        }
      });

      // Close modals
      function closeDetailModal() {
        detailModal.classList.add("hidden");
      }
      closeDetailBtn.addEventListener("click", closeDetailModal);
      closeDetailModalBtn.addEventListener("click", closeDetailModal);
      detailModal.addEventListener("click", (e) => {
        if (e.target === detailModal) closeDetailModal();
      });

      // Show voucher details
      async function showVoucherDetails(voucherId) {
        try {
          const v = await getVoucher(voucherId);
          if (!v) return;
          const typeLabel =
            {
              CR: "Cash Receipt",
              CP: "Cash Payment",
              BR: "Bank Receipt",
              BP: "Bank Payment",
              JV: "Journal Voucher",
            }[v.voucherType] || v.voucherType;
          detailContent.innerHTML = `
                    <p><span class="font-medium">Voucher Code:</span> ${v.voucherCode}</p>
                    <p><span class="font-medium">Type:</span> ${typeLabel}</p>
                    <p><span class="font-medium">Date:</span> ${v.date}</p>
                    <p><span class="font-medium">Amount:</span> ₹${v.amount.toLocaleString()}</p>
                    <p><span class="font-medium">Debit Account:</span> ${v.debitAccount || "-"}</p>
                    <p><span class="font-medium">Credit Account:</span> ${v.creditAccount || "-"}</p>
                    <p><span class="font-medium">Narration:</span> ${v.narration || "-"}</p>
                    <p><span class="font-medium">Created:</span> ${new Date(v.createdAt).toLocaleString()}</p>
                `;
          detailModal.classList.remove("hidden");
        } catch (error) {
          alert("Error loading voucher details: " + error.message);
        }
      }

      // Real-time listener for vouchers
      const vouchersQuery = query(
        collection(db, "vouchers"),
        orderBy("createdAt", "desc"),
        limit(50),
      );
      onSnapshot(vouchersQuery, (snapshot) => {
        tbody.innerHTML = "";
        document.getElementById("listCount").textContent =
          `Showing ${snapshot.size} recent vouchers`;

        snapshot.forEach((docSnap) => {
          const v = docSnap.data();
          const row = document.createElement("tr");
          row.className = "voucher-row";
          row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="font-medium text-indigo-600 clickable-code" data-id="${docSnap.id}">${v.voucherCode}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">${v.date}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${v.voucherType}</td>
                    <td class="px-6 py-4">${v.debitAccount || v.creditAccount || "-"}</td>
                    <td class="px-6 py-4 whitespace-nowrap">₹${v.amount.toLocaleString()}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        ${
                          isAdmin ?
                            `
                            <button class="edit-voucher text-indigo-600 hover:text-indigo-900 mr-2" data-id="${docSnap.id}"><i class="fas fa-edit"></i></button>
                            <button class="delete-voucher text-red-600 hover:text-red-900" data-id="${docSnap.id}"><i class="fas fa-trash"></i></button>
                        `
                          : `<span class="text-gray-400">View only</span>`
                        }
                    </td>
                `;
          tbody.appendChild(row);
        });

        // Attach click listeners for voucher codes
        document.querySelectorAll(".clickable-code").forEach((el) => {
          el.addEventListener("click", (e) => {
            const id = e.target.closest("[data-id]").dataset.id;
            showVoucherDetails(id);
          });
        });

        // Attach edit/delete if admin
        if (isAdmin) {
          document.querySelectorAll(".edit-voucher").forEach((btn) => {
            btn.addEventListener("click", () => editVoucher(btn.dataset.id));
          });
          document.querySelectorAll(".delete-voucher").forEach((btn) => {
            btn.addEventListener("click", () =>
              deleteVoucherHandler(btn.dataset.id),
            );
          });
        }
      });

      async function editVoucher(id) {
        const v = await getVoucher(id);
        if (!v) return;
        voucherId.value = id;
        // Switch to correct tab
        const type = v.voucherType;
        tabs.forEach((tab) => {
          if (tab.dataset.type === type) {
            tab.click();
          }
        });
        // Populate fields
        document.getElementById("voucherDate").value = v.date;
        document.getElementById("amount").value = v.amount;
        document.getElementById("narration").value = v.narration || "";
        const config = voucherConfig[type];
        config.fields.forEach((field) => {
          const el = document.getElementById(field.name);
          if (el) el.value = v[field.name] || "";
        });
      }

      async function deleteVoucherHandler(id) {
        if (confirm("Are you sure you want to delete this voucher?")) {
          await deleteVoucher(id);
        }
      }
    </script>
  </body>
</html>
