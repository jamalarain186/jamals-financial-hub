<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body class="p-6 bg-gray-50">
    <div class="max-w-7xl mx-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">🗂️ Chart of Accounts</h2>
        <button
          id="openAddAccountBtn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition shadow-sm flex items-center gap-2"
        >
          <i class="fas fa-plus"></i> Add Account
        </button>
      </div>

      <!-- Accounts Table -->
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Account Code
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Account Name
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Type
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Category
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Balance (₹)
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Actions
              </th>
            </tr>
          </thead>
          <tbody
            id="accountsTableBody"
            class="bg-white divide-y divide-gray-200"
          >
            <!-- Rows will be populated -->
          </tbody>
        </table>
        <div id="loadingIndicator" class="text-center py-8 text-gray-500">
          <i class="fas fa-spinner fa-spin"></i> Loading accounts...
        </div>
      </div>
    </div>

    <!-- Add/Edit Account Modal -->
    <div
      id="accountModal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 m-4">
        <h3 id="modalTitle" class="text-xl font-semibold mb-4">
          Add New Account
        </h3>
        <form id="accountForm">
          <input type="hidden" id="accountId" value="" />
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Account Code *</label
            >
            <input
              type="text"
              id="accountCode"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg"
            />
            <p class="text-xs text-gray-500 mt-1">e.g., 1010, 1020, 4000</p>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Account Name *</label
            >
            <input
              type="text"
              id="accountName"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg"
            />
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Account Type *</label
            >
            <select
              id="accountType"
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg"
            >
              <option value="Asset">Asset</option>
              <option value="Liability">Liability</option>
              <option value="Equity">Equity</option>
              <option value="Revenue">Revenue</option>
              <option value="Expense">Expense</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Category</label
            >
            <select
              id="accountCategory"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg"
            >
              <option value="Current Asset">Current Asset</option>
              <option value="Fixed Asset">Fixed Asset</option>
              <option value="Current Liability">Current Liability</option>
              <option value="Long-term Liability">Long-term Liability</option>
              <option value="Operating Revenue">Operating Revenue</option>
              <option value="Operating Expense">Operating Expense</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Opening Balance (₹)</label
            >
            <input
              type="number"
              id="openingBalance"
              step="0.01"
              value="0"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg"
            />
          </div>
          <div class="flex justify-end gap-2 mt-6">
            <button
              type="button"
              id="closeModalBtn"
              class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"
            >
              Save Account
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div
      id="deleteModal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-lg shadow-xl w-full max-w-sm p-6">
        <h3 class="text-lg font-semibold mb-2">Confirm Delete</h3>
        <p class="text-gray-600 mb-4">
          Are you sure you want to delete this account? This action cannot be
          undone.
        </p>
        <div class="flex justify-end gap-2">
          <button
            id="cancelDeleteBtn"
            class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
          >
            Cancel
          </button>
          <button
            id="confirmDeleteBtn"
            class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700"
          >
            Delete
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import { db } from "../js/firebase-config.js";
      import {
        collection,
        addDoc,
        getDocs,
        doc,
        updateDoc,
        deleteDoc,
        query,
        orderBy,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const userRole = window.parent.currentUser?.role || "employee";
      const isAdmin = userRole === "admin";

      // DOM Elements
      const tbody = document.getElementById("accountsTableBody");
      const loadingIndicator = document.getElementById("loadingIndicator");
      const modal = document.getElementById("accountModal");
      const deleteModal = document.getElementById("deleteModal");
      const openAddBtn = document.getElementById("openAddAccountBtn");
      const closeModalBtn = document.getElementById("closeModalBtn");
      const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
      const form = document.getElementById("accountForm");
      const modalTitle = document.getElementById("modalTitle");
      const accountIdInput = document.getElementById("accountId");

      // Form fields
      const codeField = document.getElementById("accountCode");
      const nameField = document.getElementById("accountName");
      const typeField = document.getElementById("accountType");
      const categoryField = document.getElementById("accountCategory");
      const balanceField = document.getElementById("openingBalance");

      let accountToDelete = null;

      // Hide add button if not admin
      if (!isAdmin) {
        openAddBtn.style.display = "none";
      }

      // Real-time listener
      const accountsQuery = query(
        collection(db, "chartOfAccounts"),
        orderBy("code"),
      );

      onSnapshot(
        accountsQuery,
        (snapshot) => {
          loadingIndicator.style.display = "none";
          tbody.innerHTML = "";

          if (snapshot.empty) {
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">No accounts found. ${isAdmin ? 'Click "Add Account" to get started.' : ""}</td></tr>`;
            return;
          }

          snapshot.forEach((docSnap) => {
            const acc = docSnap.data();
            const row = document.createElement("tr");
            row.className = "hover:bg-gray-50";
            row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${acc.code}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${acc.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${acc.type}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${acc.category || "-"}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">₹${(acc.openingBalance || 0).toLocaleString()}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        ${
                          isAdmin ?
                            `
                            <button class="edit-btn text-indigo-600 hover:text-indigo-900 mr-3" data-id="${docSnap.id}">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="delete-btn text-red-600 hover:text-red-900" data-id="${docSnap.id}" data-name="${acc.name}">
                                <i class="fas fa-trash"></i>
                            </button>
                        `
                          : `<span class="text-gray-400">View only</span>`
                        }
                    </td>
                `;
            tbody.appendChild(row);
          });

          if (isAdmin) {
            document.querySelectorAll(".edit-btn").forEach((btn) => {
              btn.addEventListener("click", () =>
                openEditModal(btn.dataset.id),
              );
            });
            document.querySelectorAll(".delete-btn").forEach((btn) => {
              btn.addEventListener("click", () =>
                openDeleteModal(btn.dataset.id, btn.dataset.name),
              );
            });
          }
        },
        (error) => {
          console.error("Error loading accounts:", error);
          loadingIndicator.innerHTML = `<span class="text-red-500">Error loading accounts. Please refresh.</span>`;
        },
      );

      // Modal controls
      openAddBtn.addEventListener("click", () => {
        modalTitle.textContent = "Add New Account";
        accountIdInput.value = "";
        form.reset();
        modal.classList.remove("hidden");
      });

      closeModalBtn.addEventListener("click", () =>
        modal.classList.add("hidden"),
      );
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.classList.add("hidden");
      });

      // Save account
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const accountData = {
          code: codeField.value.trim(),
          name: nameField.value.trim(),
          type: typeField.value,
          category: categoryField.value,
          openingBalance: parseFloat(balanceField.value) || 0,
          updatedAt: new Date().toISOString(),
        };

        try {
          const id = accountIdInput.value;
          if (id) {
            await updateDoc(doc(db, "chartOfAccounts", id), accountData);
          } else {
            accountData.createdAt = new Date().toISOString();
            await addDoc(collection(db, "chartOfAccounts"), accountData);
          }
          modal.classList.add("hidden");
        } catch (error) {
          alert("Error saving account: " + error.message);
        }
      });

      // Edit account
      async function openEditModal(id) {
        const docRef = doc(db, "chartOfAccounts", id);
        const docSnap = await getDocs(collection(db, "chartOfAccounts")); // workaround
        const actualSnap = await (
          await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
        ).getDoc(docRef);
        if (actualSnap.exists()) {
          const acc = actualSnap.data();
          modalTitle.textContent = "Edit Account";
          accountIdInput.value = id;
          codeField.value = acc.code || "";
          nameField.value = acc.name || "";
          typeField.value = acc.type || "Asset";
          categoryField.value = acc.category || "";
          balanceField.value = acc.openingBalance || 0;
          modal.classList.remove("hidden");
        }
      }

      // Delete modal flow
      function openDeleteModal(id, name) {
        accountToDelete = id;
        deleteModal.classList.remove("hidden");
      }
      cancelDeleteBtn.addEventListener("click", () => {
        deleteModal.classList.add("hidden");
        accountToDelete = null;
      });
      document
        .getElementById("confirmDeleteBtn")
        .addEventListener("click", async () => {
          if (accountToDelete) {
            await deleteDoc(doc(db, "chartOfAccounts", accountToDelete));
            deleteModal.classList.add("hidden");
            accountToDelete = null;
          }
        });
    </script>
  </body>
</html>
