<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      .clickable-code {
        cursor: pointer;
        color: #4f46e5;
        text-decoration: underline;
      }
      .ledger-row:hover {
        background-color: #f9fafb;
      }
    </style>
  </head>
  <body class="p-6 bg-gray-50">
    <div class="max-w-7xl mx-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">📒 General Ledger</h2>
        <div class="flex gap-2">
          <button
            id="refreshLedgerBtn"
            class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700"
          >
            <i class="fas fa-sync-alt mr-1"></i> Refresh
          </button>
        </div>
      </div>

      <!-- Filters -->
      <div
        class="bg-white rounded-lg shadow p-4 mb-6 flex flex-wrap gap-4 items-end"
      >
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >From Date</label
          >
          <input
            type="date"
            id="fromDate"
            class="px-3 py-2 border rounded-lg"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >To Date</label
          >
          <input type="date" id="toDate" class="px-3 py-2 border rounded-lg" />
        </div>
        <button
          id="applyFilterBtn"
          class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300"
        >
          Apply Filter
        </button>
        <button
          id="clearFilterBtn"
          class="px-4 py-2 text-gray-600 hover:text-gray-800"
        >
          Clear
        </button>
      </div>

      <!-- Ledger Table -->
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Date
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Voucher Code
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Type
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Description
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Debit (₹)
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Credit (₹)
                </th>
              </tr>
            </thead>
            <tbody
              id="ledgerBody"
              class="bg-white divide-y divide-gray-200"
            ></tbody>
            <tfoot class="bg-gray-50 font-medium">
              <tr>
                <td colspan="4" class="px-6 py-3 text-right">Totals:</td>
                <td id="totalDebit" class="px-6 py-3">₹0.00</td>
                <td id="totalCredit" class="px-6 py-3">₹0.00</td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div id="ledgerLoading" class="text-center py-8 text-gray-500">
          <i class="fas fa-spinner fa-spin"></i> Loading ledger entries...
        </div>
      </div>
    </div>

    <!-- Voucher Detail Modal -->
    <div
      id="detailModal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 m-4">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-semibold">Voucher Details</h3>
          <button
            id="closeDetailModalBtn"
            class="text-gray-500 hover:text-gray-700"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div id="detailContent" class="space-y-3"></div>
        <div class="mt-6 flex justify-end">
          <button
            id="closeDetailBtn"
            class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import { db } from "../js/firebase-config.js";
      import { getVoucher } from "../js/voucher-service.js";
      import {
        collection,
        getDocs,
        query,
        orderBy,
        where,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const ledgerBody = document.getElementById("ledgerBody");
      const ledgerLoading = document.getElementById("ledgerLoading");
      const totalDebitEl = document.getElementById("totalDebit");
      const totalCreditEl = document.getElementById("totalCredit");
      const fromDateInput = document.getElementById("fromDate");
      const toDateInput = document.getElementById("toDate");
      const applyFilterBtn = document.getElementById("applyFilterBtn");
      const clearFilterBtn = document.getElementById("clearFilterBtn");
      const refreshBtn = document.getElementById("refreshLedgerBtn");
      const detailModal = document.getElementById("detailModal");
      const detailContent = document.getElementById("detailContent");
      const closeDetailBtn = document.getElementById("closeDetailBtn");
      const closeDetailModalBtn = document.getElementById(
        "closeDetailModalBtn",
      );

      function closeDetailModal() {
        detailModal.classList.add("hidden");
      }
      closeDetailBtn.addEventListener("click", closeDetailModal);
      closeDetailModalBtn.addEventListener("click", closeDetailModal);
      detailModal.addEventListener("click", (e) => {
        if (e.target === detailModal) closeDetailModal();
      });

      async function showVoucherDetails(voucherId) {
        try {
          const v = await getVoucher(voucherId);
          if (!v) return;
          const typeLabel =
            {
              CR: "Cash Receipt",
              CP: "Cash Payment",
              BR: "Bank Receipt",
              BP: "Bank Payment",
              JV: "Journal Voucher",
            }[v.voucherType] || v.voucherType;
          detailContent.innerHTML = `
                    <p><span class="font-medium">Voucher Code:</span> ${v.voucherCode}</p>
                    <p><span class="font-medium">Type:</span> ${typeLabel}</p>
                    <p><span class="font-medium">Date:</span> ${v.date}</p>
                    <p><span class="font-medium">Amount:</span> ₹${v.amount.toLocaleString()}</p>
                    <p><span class="font-medium">Debit Account:</span> ${v.debitAccount || "-"}</p>
                    <p><span class="font-medium">Credit Account:</span> ${v.creditAccount || "-"}</p>
                    <p><span class="font-medium">Narration:</span> ${v.narration || "-"}</p>
                    <p><span class="font-medium">Created:</span> ${new Date(v.createdAt).toLocaleString()}</p>
                `;
          detailModal.classList.remove("hidden");
        } catch (error) {
          alert("Error loading voucher details: " + error.message);
        }
      }

      async function loadLedger(fromDate = null, toDate = null) {
        ledgerLoading.style.display = "block";
        ledgerBody.innerHTML = "";
        let totalDebit = 0,
          totalCredit = 0;

        try {
          let vouchers = [];
          // Try indexed query first, fallback to client-side filter if fails
          try {
            let q = collection(db, "vouchers");
            if (fromDate && toDate) {
              q = query(
                q,
                where("date", ">=", fromDate),
                where("date", "<=", toDate),
                orderBy("date", "asc"),
                orderBy("createdAt", "asc"),
              );
            } else if (fromDate) {
              q = query(
                q,
                where("date", ">=", fromDate),
                orderBy("date", "asc"),
                orderBy("createdAt", "asc"),
              );
            } else if (toDate) {
              q = query(
                q,
                where("date", "<=", toDate),
                orderBy("date", "asc"),
                orderBy("createdAt", "asc"),
              );
            } else {
              q = query(q, orderBy("date", "asc"), orderBy("createdAt", "asc"));
            }
            const snapshot = await getDocs(q);
            vouchers = snapshot.docs.map((doc) => ({
              id: doc.id,
              ...doc.data(),
            }));
          } catch (indexError) {
            console.warn(
              "Index not ready, using fallback client-side sort:",
              indexError,
            );
            // Fallback: get all vouchers and sort/filter in memory
            const snapshot = await getDocs(collection(db, "vouchers"));
            vouchers = snapshot.docs.map((doc) => ({
              id: doc.id,
              ...doc.data(),
            }));
            // Apply date filters
            if (fromDate) vouchers = vouchers.filter((v) => v.date >= fromDate);
            if (toDate) vouchers = vouchers.filter((v) => v.date <= toDate);
            // Sort by date then createdAt
            vouchers.sort((a, b) => {
              if (a.date !== b.date) return a.date.localeCompare(b.date);
              return (a.createdAt || "").localeCompare(b.createdAt || "");
            });
          }

          ledgerLoading.style.display = "none";

          if (vouchers.length === 0) {
            ledgerBody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">No vouchers found.</td></tr>`;
            totalDebitEl.textContent = "₹0.00";
            totalCreditEl.textContent = "₹0.00";
            return;
          }

          vouchers.forEach((v) => {
            let debitAccount = v.debitAccount || "";
            let creditAccount = v.creditAccount || "";
            let debitAmount = 0,
              creditAmount = 0;

            if (v.voucherType === "CR" || v.voucherType === "BR") {
              debitAmount = v.amount;
            } else if (v.voucherType === "CP" || v.voucherType === "BP") {
              creditAmount = v.amount;
            } else {
              // JV: simple logic
              if (
                debitAccount.toLowerCase().includes("cash") ||
                debitAccount.toLowerCase().includes("bank")
              ) {
                debitAmount = v.amount;
              } else {
                creditAmount = v.amount;
              }
            }

            totalDebit += debitAmount;
            totalCredit += creditAmount;

            const row = document.createElement("tr");
            row.className = "ledger-row";
            row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">${v.date}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="clickable-code" data-id="${v.id}">${v.voucherCode}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">${v.voucherType}</td>
                        <td class="px-6 py-4">${v.narration || debitAccount + " / " + creditAccount}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right">${debitAmount > 0 ? "₹" + debitAmount.toLocaleString() : "-"}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right">${creditAmount > 0 ? "₹" + creditAmount.toLocaleString() : "-"}</td>
                    `;
            ledgerBody.appendChild(row);
          });

          totalDebitEl.textContent = `₹${totalDebit.toLocaleString()}`;
          totalCreditEl.textContent = `₹${totalCredit.toLocaleString()}`;

          document.querySelectorAll(".clickable-code").forEach((el) => {
            el.addEventListener("click", (e) => {
              const id = e.target.closest("[data-id]").dataset.id;
              showVoucherDetails(id);
            });
          });
        } catch (error) {
          console.error("Ledger error:", error);
          ledgerLoading.innerHTML = `<span class="text-red-500">Error loading ledger: ${error.message}</span>`;
        }
      }

      loadLedger();

      applyFilterBtn.addEventListener("click", () =>
        loadLedger(fromDateInput.value, toDateInput.value),
      );
      clearFilterBtn.addEventListener("click", () => {
        fromDateInput.value = "";
        toDateInput.value = "";
        loadLedger();
      });
      refreshBtn.addEventListener("click", () =>
        loadLedger(fromDateInput.value, toDateInput.value),
      );
    </script>
  </body>
</html>
