<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body class="p-6 bg-gray-50">
    <div class="max-w-4xl mx-auto">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">⚙️ Admin Panel</h2>

      <!-- Create User Card -->
      <div class="bg-white rounded-lg shadow p-6 mb-8">
        <h3 class="text-lg font-semibold mb-4">➕ Create New User</h3>
        <form id="createUserForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Full Name *</label
            >
            <input
              type="text"
              id="userName"
              required
              class="w-full px-3 py-2 border rounded-lg"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Email *</label
            >
            <input
              type="email"
              id="userEmail"
              required
              class="w-full px-3 py-2 border rounded-lg"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Password *</label
            >
            <input
              type="password"
              id="userPassword"
              required
              minlength="6"
              class="w-full px-3 py-2 border rounded-lg"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Role *</label
            >
            <select
              id="userRole"
              required
              class="w-full px-3 py-2 border rounded-lg"
            >
              <option value="employee">Employee</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="md:col-span-2 flex justify-end">
            <button
              type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition"
            >
              <i class="fas fa-user-plus mr-1"></i> Create User
            </button>
          </div>
        </form>
        <div id="createMessage" class="mt-4 text-sm"></div>
      </div>

      <!-- Users List (View Users) -->
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="px-6 py-4 border-b">
          <h3 class="font-semibold text-gray-800">👥 Registered Users</h3>
        </div>
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Name
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Email
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Role
              </th>
              <th
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
              >
                Created
              </th>
            </tr>
          </thead>
          <tbody id="usersTableBody" class="bg-white divide-y divide-gray-200">
            <!-- Populated via JS -->
          </tbody>
        </table>
        <div id="loadingUsers" class="text-center py-4 text-gray-500">
          <i class="fas fa-spinner fa-spin"></i> Loading users...
        </div>
      </div>
    </div>

    <script type="module">
      import { db } from "../js/firebase-config.js";
      import { createUserByAdmin } from "../js/auth.js";
      import {
        collection,
        getDocs,
        query,
        orderBy,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const userRole = window.parent.currentUser?.role || "employee";
      if (userRole !== "admin") {
        document.body.innerHTML =
          '<div class="p-6 text-center text-red-600">Access Denied: Admin only.</div>';
      }

      const form = document.getElementById("createUserForm");
      const msgDiv = document.getElementById("createMessage");
      const tbody = document.getElementById("usersTableBody");
      const loadingDiv = document.getElementById("loadingUsers");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("userName").value.trim();
        const email = document.getElementById("userEmail").value.trim();
        const password = document.getElementById("userPassword").value;
        const role = document.getElementById("userRole").value;

        try {
          await createUserByAdmin(email, password, role, name);
          msgDiv.innerHTML = `<span class="text-green-600">✅ User ${email} created successfully!</span>`;
          form.reset();
        } catch (error) {
          let errorMsg = error.message;
          if (error.code === "auth/email-already-in-use") {
            errorMsg =
              "This email is already registered. Please use a different email.";
          } else if (error.code === "auth/weak-password") {
            errorMsg = "Password should be at least 6 characters.";
          }
          msgDiv.innerHTML = `<span class="text-red-600">❌ Error: ${errorMsg}</span>`;
        }
      });

      // Real-time users list
      const usersQuery = query(
        collection(db, "users"),
        orderBy("createdAt", "desc"),
      );
      onSnapshot(usersQuery, (snapshot) => {
        loadingDiv.style.display = "none";
        tbody.innerHTML = "";
        if (snapshot.empty) {
          tbody.innerHTML =
            '<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">No users found.</td></tr>';
          return;
        }
        snapshot.forEach((doc) => {
          const u = doc.data();
          const row = document.createElement("tr");
          row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">${u.name || "-"}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${u.email}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 text-xs rounded-full ${u.role === "admin" ? "bg-purple-100 text-purple-800" : "bg-gray-100 text-gray-800"}">${u.role}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : "-"}</td>
                `;
          tbody.appendChild(row);
        });
      });
    </script>
  </body>
</html>
