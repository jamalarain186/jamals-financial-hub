<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jamal's Financial Hub - Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body
    class="bg-gradient-to-br from-blue-900 via-indigo-800 to-purple-900 min-h-screen flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md">
      <!-- Logo / Title -->
      <div class="text-center mb-8">
        <div
          class="inline-block p-4 bg-white/10 backdrop-blur-sm rounded-2xl shadow-2xl"
        >
          <span class="text-4xl">💰</span>
        </div>
        <h1 class="text-3xl font-bold text-white mt-4 drop-shadow-lg">
          Jamal's Financial Hub
        </h1>
        <p class="text-indigo-200 mt-1">Secure. Smart. Simple.</p>
      </div>

      <!-- Login Card -->
      <div
        class="bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl p-8 border border-white/20"
      >
        <h2
          class="text-2xl font-semibold text-gray-800 mb-6 flex items-center gap-2"
        >
          <span>🔐</span> Sign In
        </h2>

        <form id="loginForm" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Email Address</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"
                >📧</span
              >
              <input
                type="email"
                id="email"
                required
                class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Password</label
            >
            <div class="relative">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"
                >🔒</span
              >
              <input
                type="password"
                id="password"
                required
                class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow-md hover:shadow-lg"
          >
            Sign In
          </button>

          <div
            id="errorMessage"
            class="text-red-500 text-sm text-center min-h-[20px]"
          ></div>
        </form>

        <!-- Demo Credentials -->
        <div class="mt-6 pt-4 border-t border-gray-200">
          <p class="text-xs text-gray-500 text-center mb-2">Demo Credentials</p>
          <div class="grid grid-cols-2 gap-2 text-xs">
            <div class="bg-gray-50 p-2 rounded text-center">
              <span class="font-medium">Admin:</span> admin@jamal.com
            </div>
            <div class="bg-gray-50 p-2 rounded text-center">
              <span class="font-medium">Employee:</span> employee@jamal.com
            </div>
          </div>
          <p class="text-xs text-gray-400 text-center mt-2">
            Any password works for demo
          </p>
        </div>
      </div>

      <p class="text-center text-indigo-200 text-sm mt-6">
        © 2026 Jamal's Financial Hub. All rights reserved.
      </p>
    </div>

    <!-- Firebase & Auth Scripts -->
    <script type="module">
      import { initLoginPage } from "./js/auth.js";

      // Initialize login page functionality
      initLoginPage();
    </script>
  </body>
</html>
